    .family-site-rolling a {
      font-size: 12px;
      color: #aaa;
      margin: 0 2px;

      vertical-align: middle;
      transition: color .2s;
    }

    .family-site-rolling a:hover {
      color: #fff;
      text-decoration: underline;
    }

    @keyframes rolling {
      0% {

      }

      100% {
